<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg4)"/>
  <!-- YouTube play button -->
  <rect x="120" y="100" width="180" height="120" rx="12" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
  <polygon points="195,140 195,180 225,160" fill="#ef4444" opacity="0.6"/>
  <rect x="120" y="240" width="180" height="8" rx="4" fill="#ef4444" opacity="0.15"/>
  <rect x="120" y="256" width="140" height="6" rx="3" fill="#ef4444" opacity="0.1"/>
  <rect x="120" y="270" width="160" height="6" rx="3" fill="#ef4444" opacity="0.1"/>
  <!-- Arrow flow -->
  <line x1="320" y1="160" x2="370" y2="160" stroke="#f97316" stroke-width="1.5" opacity="0.4"/>
  <polygon points="370,155 380,160 370,165" fill="#f97316" opacity="0.4"/>
  <!-- Chunks / embeddings -->
  <rect x="400" y="100" width="100" height="24" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1" opacity="0.3"/>
  <rect x="400" y="134" width="100" height="24" rx="6" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1" opacity="0.3"/>
  <rect x="400" y="168" width="100" height="24" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1" opacity="0.3"/>
  <rect x="400" y="202" width="100" height="24" rx="6" fill="#f97316" opacity="0.1" stroke="#f97316" stroke-width="1" opacity="0.3"/>
  <text x="450" y="116" text-anchor="middle" fill="#f97316" font-size="8" font-family="monospace" opacity="0.7">chunk_1</text>
  <text x="450" y="150" text-anchor="middle" fill="#f97316" font-size="8" font-family="monospace" opacity="0.7">chunk_2</text>
  <text x="450" y="184" text-anchor="middle" fill="#f97316" font-size="8" font-family="monospace" opacity="0.7">chunk_3</text>
  <text x="450" y="218" text-anchor="middle" fill="#f97316" font-size="8" font-family="monospace" opacity="0.7">chunk_4</text>
  <!-- Arrow to LLM -->
  <line x1="520" y1="160" x2="570" y2="160" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
  <polygon points="570,155 580,160 570,165" fill="#ef4444" opacity="0.4"/>
  <!-- LLM box -->
  <rect x="600" y="120" width="120" height="80" rx="12" fill="url(#accent4)" opacity="0.15" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
  <text x="660" y="155" text-anchor="middle" fill="#ef4444" font-size="12" font-family="monospace" opacity="0.8">Ollama</text>
  <text x="660" y="175" text-anchor="middle" fill="#f97316" font-size="9" font-family="monospace" opacity="0.6">Local LLM</text>
  <!-- Search indicators -->
  <circle cx="440" cy="280" r="16" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.3"/>
  <line x1="452" y1="292" x2="462" y2="302" stroke="#ef4444" stroke-width="2" opacity="0.3"/>
  <text x="485" y="288" fill="#f97316" font-size="9" font-family="sans-serif" opacity="0.5">Hybrid Search</text>
  <!-- Elasticsearch icon -->
  <circle cx="640" cy="280" r="16" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.3"/>
  <text x="640" y="284" text-anchor="middle" fill="#f97316" font-size="9" font-family="monospace" opacity="0.6">ES</text>
  <!-- Monitoring dots -->
  <circle cx="640" cy="330" r="4" fill="#22c55e" opacity="0.5"/>
  <circle cx="660" cy="330" r="4" fill="#22c55e" opacity="0.4"/>
  <circle cx="680" cy="330" r="4" fill="#22c55e" opacity="0.3"/>
  <text x="640" y="355" fill="#22c55e" font-size="8" font-family="sans-serif" opacity="0.4">Grafana</text>
</svg>
