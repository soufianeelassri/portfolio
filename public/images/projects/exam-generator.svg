<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg5)"/>
  <!-- PDF document -->
  <rect x="130" y="80" width="120" height="160" rx="6" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
  <rect x="130" y="80" width="30" height="30" fill="#8b5cf6" opacity="0.2"/>
  <polygon points="130,110 160,110 160,80" fill="#0f172a"/>
  <line x1="150" y1="120" x2="230" y2="120" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
  <line x1="150" y1="135" x2="220" y2="135" stroke="#8b5cf6" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="150" x2="225" y2="150" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
  <line x1="150" y1="165" x2="210" y2="165" stroke="#8b5cf6" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="180" x2="230" y2="180" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
  <line x1="150" y1="195" x2="215" y2="195" stroke="#8b5cf6" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="210" x2="220" y2="210" stroke="#8b5cf6" stroke-width="1" opacity="0.1"/>
  <text x="190" y="100" text-anchor="middle" fill="#8b5cf6" font-size="10" font-family="monospace" opacity="0.6">PDF</text>
  <!-- Arrow -->
  <line x1="270" y1="160" x2="330" y2="160" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <polygon points="330,155 340,160 330,165" fill="#6366f1" opacity="0.4"/>
  <!-- Gemini AI brain -->
  <circle cx="410" cy="160" r="50" fill="url(#accent5)" opacity="0.1" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
  <text x="410" y="155" text-anchor="middle" fill="#8b5cf6" font-size="11" font-family="monospace" opacity="0.8">Gemini</text>
  <text x="410" y="172" text-anchor="middle" fill="#6366f1" font-size="8" font-family="monospace" opacity="0.6">AI</text>
  <!-- Sparkles around brain -->
  <circle cx="370" cy="120" r="2" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="450" cy="125" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="445" cy="195" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="375" cy="200" r="2" fill="#6366f1" opacity="0.4"/>
  <!-- Arrow -->
  <line x1="470" y1="160" x2="530" y2="160" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
  <polygon points="530,155 540,160 530,165" fill="#8b5cf6" opacity="0.4"/>
  <!-- Exam questions -->
  <rect x="560" y="80" width="180" height="240" rx="8" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
  <!-- Q1 - MCQ -->
  <rect x="575" y="95" width="150" height="40" rx="4" fill="#8b5cf6" opacity="0.1"/>
  <text x="585" y="112" fill="#8b5cf6" font-size="8" font-family="sans-serif" opacity="0.7">Q1. Multiple Choice</text>
  <circle cx="590" cy="125" r="4" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
  <circle cx="590" cy="125" r="2" fill="#8b5cf6" opacity="0.6"/>
  <!-- Q2 - True/False -->
  <rect x="575" y="145" width="150" height="40" rx="4" fill="#6366f1" opacity="0.1"/>
  <text x="585" y="162" fill="#6366f1" font-size="8" font-family="sans-serif" opacity="0.7">Q2. True / False</text>
  <rect x="583" y="170" width="24" height="12" rx="6" fill="#6366f1" opacity="0.3"/>
  <circle cx="601" cy="176" r="4" fill="#6366f1" opacity="0.6"/>
  <!-- Q3 - Open ended -->
  <rect x="575" y="195" width="150" height="40" rx="4" fill="#8b5cf6" opacity="0.1"/>
  <text x="585" y="212" fill="#8b5cf6" font-size="8" font-family="sans-serif" opacity="0.7">Q3. Open-ended</text>
  <line x1="583" y1="227" x2="710" y2="227" stroke="#8b5cf6" stroke-width="0.8" opacity="0.2"/>
  <!-- Score -->
  <rect x="575" y="250" width="150" height="30" rx="4" fill="url(#accent5)" opacity="0.15"/>
  <text x="650" y="270" text-anchor="middle" fill="#8b5cf6" font-size="11" font-family="monospace" opacity="0.8">Score: 85%</text>
  <!-- Bottom tech badges -->
  <rect x="130" y="300" width="55" height="20" rx="10" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
  <text x="157" y="314" text-anchor="middle" fill="#8b5cf6" font-size="8" font-family="sans-serif" opacity="0.5">React</text>
  <rect x="195" y="300" width="60" height="20" rx="10" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
  <text x="225" y="314" text-anchor="middle" fill="#6366f1" font-size="8" font-family="sans-serif" opacity="0.5">FastAPI</text>
  <rect x="265" y="300" width="65" height="20" rx="10" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
  <text x="297" y="314" text-anchor="middle" fill="#8b5cf6" font-size="8" font-family="sans-serif" opacity="0.5">MongoDB</text>
</svg>
