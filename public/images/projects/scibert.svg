<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg3)"/>
  <!-- Neural network layers -->
  <!-- Input layer -->
  <circle cx="200" cy="100" r="12" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <circle cx="200" cy="150" r="12" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <circle cx="200" cy="200" r="12" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <circle cx="200" cy="250" r="12" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <circle cx="200" cy="300" r="12" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <!-- Hidden layer 1 -->
  <circle cx="350" cy="120" r="12" fill="#f59e0b" opacity="0.3"/>
  <circle cx="350" cy="170" r="12" fill="#f59e0b" opacity="0.4"/>
  <circle cx="350" cy="220" r="12" fill="#f59e0b" opacity="0.5"/>
  <circle cx="350" cy="270" r="12" fill="#f59e0b" opacity="0.3"/>
  <!-- Hidden layer 2 -->
  <circle cx="500" cy="140" r="12" fill="#ef4444" opacity="0.3"/>
  <circle cx="500" cy="200" r="12" fill="#ef4444" opacity="0.5"/>
  <circle cx="500" cy="260" r="12" fill="#ef4444" opacity="0.3"/>
  <!-- Output layer -->
  <circle cx="630" cy="160" r="14" fill="url(#accent3)" opacity="0.7"/>
  <circle cx="630" cy="220" r="14" fill="url(#accent3)" opacity="0.7"/>
  <!-- Connections input -> hidden1 -->
  <line x1="212" y1="100" x2="338" y2="120" stroke="#f59e0b" stroke-width="0.8" opacity="0.15"/>
  <line x1="212" y1="100" x2="338" y2="170" stroke="#f59e0b" stroke-width="0.8" opacity="0.1"/>
  <line x1="212" y1="150" x2="338" y2="120" stroke="#f59e0b" stroke-width="0.8" opacity="0.1"/>
  <line x1="212" y1="150" x2="338" y2="170" stroke="#f59e0b" stroke-width="0.8" opacity="0.15"/>
  <line x1="212" y1="150" x2="338" y2="220" stroke="#f59e0b" stroke-width="0.8" opacity="0.1"/>
  <line x1="212" y1="200" x2="338" y2="170" stroke="#f59e0b" stroke-width="0.8" opacity="0.15"/>
  <line x1="212" y1="200" x2="338" y2="220" stroke="#f59e0b" stroke-width="0.8" opacity="0.2"/>
  <line x1="212" y1="200" x2="338" y2="270" stroke="#f59e0b" stroke-width="0.8" opacity="0.1"/>
  <line x1="212" y1="250" x2="338" y2="220" stroke="#f59e0b" stroke-width="0.8" opacity="0.15"/>
  <line x1="212" y1="250" x2="338" y2="270" stroke="#f59e0b" stroke-width="0.8" opacity="0.15"/>
  <line x1="212" y1="300" x2="338" y2="270" stroke="#f59e0b" stroke-width="0.8" opacity="0.15"/>
  <!-- Connections hidden1 -> hidden2 -->
  <line x1="362" y1="120" x2="488" y2="140" stroke="#ef4444" stroke-width="0.8" opacity="0.15"/>
  <line x1="362" y1="120" x2="488" y2="200" stroke="#ef4444" stroke-width="0.8" opacity="0.1"/>
  <line x1="362" y1="170" x2="488" y2="140" stroke="#ef4444" stroke-width="0.8" opacity="0.1"/>
  <line x1="362" y1="170" x2="488" y2="200" stroke="#ef4444" stroke-width="0.8" opacity="0.15"/>
  <line x1="362" y1="220" x2="488" y2="200" stroke="#ef4444" stroke-width="0.8" opacity="0.2"/>
  <line x1="362" y1="220" x2="488" y2="260" stroke="#ef4444" stroke-width="0.8" opacity="0.15"/>
  <line x1="362" y1="270" x2="488" y2="260" stroke="#ef4444" stroke-width="0.8" opacity="0.15"/>
  <!-- Connections hidden2 -> output -->
  <line x1="512" y1="140" x2="616" y2="160" stroke="#ef4444" stroke-width="1" opacity="0.2"/>
  <line x1="512" y1="200" x2="616" y2="160" stroke="#ef4444" stroke-width="1" opacity="0.15"/>
  <line x1="512" y1="200" x2="616" y2="220" stroke="#ef4444" stroke-width="1" opacity="0.2"/>
  <line x1="512" y1="260" x2="616" y2="220" stroke="#ef4444" stroke-width="1" opacity="0.15"/>
  <!-- Labels -->
  <text x="630" y="164" text-anchor="middle" fill="white" font-size="9" font-family="monospace" opacity="0.8">0.91</text>
  <text x="630" y="224" text-anchor="middle" fill="white" font-size="9" font-family="monospace" opacity="0.8">F1</text>
  <!-- Category badges -->
  <rect x="660" y="100" width="60" height="20" rx="10" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <text x="690" y="114" text-anchor="middle" fill="#f59e0b" font-size="8" font-family="sans-serif" opacity="0.7">Physics</text>
  <rect x="660" y="130" width="50" height="20" rx="10" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1" opacity="0.3"/>
  <text x="685" y="144" text-anchor="middle" fill="#ef4444" font-size="8" font-family="sans-serif" opacity="0.7">CS</text>
  <rect x="660" y="160" width="55" height="20" rx="10" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <text x="687" y="174" text-anchor="middle" fill="#f59e0b" font-size="8" font-family="sans-serif" opacity="0.7">Math</text>
  <rect x="660" y="250" width="50" height="20" rx="10" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1" opacity="0.3"/>
  <text x="685" y="264" text-anchor="middle" fill="#ef4444" font-size="8" font-family="sans-serif" opacity="0.7">Bio</text>
  <rect x="660" y="280" width="55" height="20" rx="10" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <text x="687" y="294" text-anchor="middle" fill="#f59e0b" font-size="8" font-family="sans-serif" opacity="0.7">Econ</text>
</svg>
